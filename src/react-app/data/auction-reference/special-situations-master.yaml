  브리핑_팩트: 산업단지(국가·일반·도시첨단·농공) 내 공장·지식산업센터·산업용지로, 산업집적활성화법에 따라 입주계약·입주자격·실입주 의무·처분(전매) 제한이 적용됩니다. 경매 취득자도 한국산업단지공단 등 관리기관과 입주계약을 체결·승계하고 취득일로부터 일정 기간(통상 1년) 내 입주 가능 업종으로 사업자등록 후 실입주하여야 하며, 자격 미충족·미입주 시 처분명령·환수 대상이 될 수 있습니다.
