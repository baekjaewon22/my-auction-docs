  브리핑_팩트: 옥상·지상에 태양광·태양열 발전설비가 설치된 물건입니다. 감정·매각에서 제외된 제시외 동산인 경우가 많아, 제외되었으면 철거·존치 협의와 명도 대상이 되고 발전사업권은 승계되지 않으며, 건물에 부합된 것으로 평가되면 매각에 포함됩니다. 신규 설치 수익 목적이면 개발행위허가·발전사업허가·한전 계통연계·이격거리 조례가 필요합니다.
  행위유도: 감정평가서와 매각물건명세서에서 태양광 설비의 매각 포함·제외 여부를 확인하고, 설치 목적인 경우 발전허가·계통연계 가능성을 검토하여야 합니다.
