메타:
  제목: 경매 특수상황 마스터 (브리핑·체크리스트 단일 원천)
  버전: '1.0'
  기준일: '2026-06-30'
  항목수: 46
  필드설명:
    코드: 식별자(카테고리-순번)
    명칭: 특수상황 명칭
    위험도: 상/중/하
    인수여부: 낙찰자 부담 요약
    자동탐지_트리거: 업로드 자료에서 이 상황을 자동 태깅하는 키워드·조건
    브리핑_팩트: 고객용 설명(팩트). 사이트 브리핑에 표시
    행위유도: 검토·확인 등 주의 문구. 브리핑에는 {중괄호}로 표시
    담당자_사전조사_체크리스트: 작성 전 현장·관청에서 확인할 항목
    검수인_크로스체크_체크리스트: 담당자 작성물을 독립 재확인할 항목
    근거: 관련 법령·판례
항목:
- 코드: LIM-01
  명칭: 선순위임차인 / 대항력 있는 임차인
  위험도: 상
  인수여부: 조건부 인수(배당부족액)
  자동탐지_트리거:
  - 전입세대 존재
  - 전입일 < 말소기준일
  - 확정일자·배당요구 여부 불명
  - 점유자가 소유자와 상이
  브리핑_팩트: 임차인이 주택의 인도와 전입신고를 마치면 그 다음 날 0시부터 대항력이 발생합니다(주택임대차보호법 제3조). 이 대항력 발생일이 말소기준권리보다 앞서면 매수인은 임대인 지위를 승계하여 보증금 반환의무를 인수합니다. 임차인이 배당요구로 보증금을 전액 배당받으면 인수액이 없으나, 배당받지 못한 차액은 낙찰자가 부담합니다. 확정일자(제3조의2)를 갖춘 임차인은 후순위 권리자보다 우선 변제받습니다.
  행위유도: 전입세대 열람과 전입일·확정일자·배당요구 종기를 말소기준권리와 대조하여 인수 보증금 여부를 확인하고, 임차인이 채무자 본인·가족 등 무상거주자인지 검토하여야 합니다.
  담당자_사전조사_체크리스트:
  - 전입세대열람내역서 발급
  - 임대차계약서·확정일자·보증금액 확보
  - 현장 점유자 면담(실거주·보증금 실체)
  - 배당요구종기 내 배당요구 여부 확인
  검수인_크로스체크_체크리스트:
  - 전입일·확정일·배당요구일을 말소기준권리와 재대조
  - 인수 보증금액 직접 재계산
  - 무상거주확인서·가족관계로 위장임차 여부 검증
  - 배당부족액 산정 근거 검토
  근거: 주택임대차보호법 제3조·제3조의2, 민사집행법 제91조
- 코드: LIM-02
  명칭: 선순위 전세권
  위험도: 상
  인수여부: 조건부 인수
  자동탐지_트리거:
  - 최선순위 전세권 등기
  - 전세권이 말소기준권리보다 선순위
  - 전세권자 배당요구 여부 불명
  브리핑_팩트: 말소기준권리보다 앞선 최선순위 전세권은 민사집행법 제91조에 따라 전세권자가 배당요구를 하거나 스스로 경매를 신청하면 매각으로 소멸하지만, 배당요구를 하지 않으면 매수인이 인수하여 전세금 반환의무를 승계합니다.
  행위유도: 전세권의 존속기간과 전세금액, 매각물건명세서상 배당요구 여부를 확인하여 인수 금액을 입찰가에 반영하여야 합니다.
  담당자_사전조사_체크리스트:
  - 등기부상 전세권 설정일·금액·존속기간 확인
  - 전세권자 배당요구 여부 조회
  - 건물 전부/일부 전세권인지 확인
  검수인_크로스체크_체크리스트:
  - 전세권 선후순위 재확인
  - 배당요구 미신청 시 인수전세금 재계산
  - 입찰가에 인수액 반영 여부 점검
  근거: 민사집행법 제91조
- 코드: LIM-03
  명칭: 소액임차인 최우선변제
  위험도: 중
  인수여부: 비인수(배당재원 잠식)
  자동탐지_트리거:
  - 소액 보증금 임차인 존재
  - 다수 임차인 전입
  - 담보물권 설정시점 대비 보증금 한도 충족
  브리핑_팩트: 소액임차인은 보증금 중 일정액을 다른 담보물권자보다 우선하여 배당받으므로 일반채권자·후순위 권리자의 배당재원이 줄어듭니다. 해당 여부는 지역과 담보물권 설정 시점별 보증금 한도에 따라 달라집니다.
  행위유도: 배당표상 최우선변제액과 그 영향을 확인하고, 위장 소액임차인의 가능성을 점검하여야 합니다.
  담당자_사전조사_체크리스트:
  - 임차인별 보증금·전입일 정리
  - 담보물권 설정시점 기준 소액 해당 여부 판정
  - 임차인 실체(계약·이체) 확인
  검수인_크로스체크_체크리스트:
  - 지역·시점별 보증금 한도표와 재대조
  - 최우선변제 총액이 배당에 미치는 영향 검증
  - 위장 소액임차인 정황 점검
  근거: 주택임대차보호법 제8조, 상가건물임대차보호법 제14조
- 코드: LIM-04
  명칭: 임금채권 최우선변제
  위험도: 중
  인수여부: 비인수(배당재원 잠식)
  자동탐지_트리거:
  - 사업장·공장 물건
  - 근로자 임금채권 배당요구
  - 체불임금 정황
  브리핑_팩트: 근로기준법·근로자퇴직급여보장법에 따라 근로자의 최종 3개월분 임금과 최종 3년분 퇴직금, 재해보상금은 다른 담보물권보다 우선 변제되어 배당재원을 잠식할 수 있습니다.
  행위유도: 체불임금의 존재와 배당요구 여부, 근로자의 점유·유치권 주장 연계 여부를 확인하여야 합니다.
  담당자_사전조사_체크리스트:
  - 체불임금·퇴직금 배당요구 내역 확인
  - 근로자 점유 여부 현장 확인
  검수인_크로스체크_체크리스트:
  - 최우선 임금채권 총액 검증
  - 근로자 점유가 유치권 주장으로 이어지는지 점검
  - 배당순위 재확인
  근거: 근로기준법 제38조, 근로자퇴직급여보장법 제12조
- 코드: LIM-05
  명칭: 당해세
  위험도: 중
  인수여부: 비인수(배당 우선)
  자동탐지_트리거:
  - 재산세·종부세·상속·증여세 체납 정황
  - 교부청구 존재
  브리핑_팩트: 당해세(재산세·종합부동산세·상속·증여세 등)는 법정기일과 관계없이 다른 조세·채권보다 우선 배당되어 대항력 있는 임차인·후순위 권리자의 배당액이 줄 수 있습니다. 2023년 이후 일부 임차보증금에 대하여는 당해세보다 우선하는 예외가 신설되었습니다.
  행위유도: 체납 당해세의 종류와 금액, 배당에 미치는 영향과 임차보증금과의 우선순위를 확인하여야 합니다.
  담당자_사전조사_체크리스트:
  - 교부청구서상 당해세 종류·금액 확인
  - 임차보증금 우선 예외 적용 여부 검토
  검수인_크로스체크_체크리스트:
  - 당해세 우선배당이 임차인 인수액에 미치는 영향 재계산
  - 2023년 임차보증금 우선 예외 적용 정확성 검증
  근거: 국세기본법 제35조, 지방세기본법 제71조
- 코드: LIM-06
  명칭: 허위 · 위장 임차인(통정)
  위험도: 상
  인수여부: 배제 가능(분쟁)
  자동탐지_트리거:
  - 전입만 있고 거주 흔적 미약
  - 임차인이 채무자 친족
  - 보증금 이체내역 불명
  - 경매임박 전입
  브리핑_팩트: 채무자와 통정한 가장임차인은 대항력·우선변제권이 인정되지 않으며, 전입신고만 있을 뿐 실제 거주·보증금 수수의 실체가 없으면 배당에서 배제되고 인도명령의 대상이 됩니다.
  행위유도: 임차인의 실제 거주 여부와 보증금의 실체(계좌이체·계약서), 채무자와의 관계 및 전입 시점의 의심 정황을 탐문·확인하여야 합니다.
  담당자_사전조사_체크리스트:
  - 현장 거주 흔적·우편물 채증
  - 보증금 이체내역·계약서 진정성 확인
  - 채무자와의 관계(주민·가족) 탐문
  - 전입 시점과 경매 진행의 시간적 근접성 확인
  검수인_크로스체크_체크리스트:
  - 가장임차 정황 증거의 충분성 검증
  - 배당배제·인도명령 가능성 법리 검토
  - 무리한 배제 주장으로 인한 역공 위험 점검
  근거: 주택임대차보호법 제3조, 민법 제108조
- 코드: BLD-01
  명칭: 위반건축물
  위험도: 상
  인수여부: 비용 인수
  자동탐지_트리거:
  - 건축물대장 '위반건축물' 표기
  - 무허가·무단증축·용도변경 정황
  - 항공뷰 대비 면적 상이
  브리핑_팩트: 본건은 위반건축물로 등재되었거나 무허가·무단증축·무단 용도변경이 있는 물건입니다. 시정하지 않으면 건축법 제79조 시정명령과 제80조 이행강제금이 부과되며, 2019. 4. 23. 개정으로 부과횟수 제한이 폐지되어 시정 시까지 매년 반복 부과될 수 있습니다. 영업 인허가·대출이 제한될 수 있고 이행강제금과 철거·원상복구 비용은 낙찰자가 부담합니다.
  행위유도: 관할 시·군·구 건축과를 통해 위반 내용과 양성화 가능 여부, 이행강제금 부과 이력 및 예상 비용을 사전에 확인하여야 합니다.
  담당자_사전조사_체크리스트:
  - 건축물대장 발급·위반내용 확인
  - 건축과에 양성화 가능 여부 문의
  - 이행강제금 부과이력·연간 금액 조회
  - 철거·원상복구 견적 산정
  검수인_크로스체크_체크리스트:
  - 위반 표기·면적 재확인
  - 이행강제금 반복부과 누적액 검증
  - 양성화 불가 시 비용의 입찰가 반영 점검
  - 인허가·대출 제한 영향 검토
  근거: 건축법 제79조·제80조(2019.4.23 개정)
- 코드: BLD-02
  명칭: 제시외 건물
  위험도: 상
  인수여부: 인수/철거 분쟁 가능
  자동탐지_트리거:
  - 감정서 '제시외' 표기
  - 미등기 건물 현존
  - 건물 소유자와 토지 소유자 상이
  브리핑_팩트: 제시외 건물이란 등기부·건축물대장에 없으나 현장에 실제 존재하는 건물입니다. 주된 건물의 부합물·종물이면 경매목적물에 포함되어 함께 취득하나(민법 제100조·제358조), 독립된 타인 소유 건물이면 매각에서 제외되어 법정지상권·철거 분쟁이 발생할 수 있습니다.
  행위유도: 감정평가서상 제시외 건물의 매각 포함·제외 여부와 평가금액, 매각물건명세서의 표시를 확인하고, 제시외 건물이 위법건축물인 경우 위반건축물 위험을 함께 검토하여야 합니다.
  담당자_사전조사_체크리스트:
  - 감정서상 제시외 포함·제외·평가액 확인
  - 제시외 건물 소유관계 추적
  - 위법건축물 여부 확인
  검수인_크로스체크_체크리스트:
  - 매각물건명세서 표시와 감정서 일치 검증
  - 제외된 경우 법정지상권 성립 위험 평가
  - 철거·명도 시나리오 점검
  근거: 민법 제100조·제358조
- 코드: BLD-03
  명칭: 대지권 미등기
  위험도: 중
  인수여부: 원칙적 비인수(취득)
  자동탐지_트리거:
  - 집합건물 대지권 미등기
  - 감정서 대지권 가격 포함/제외 표기
